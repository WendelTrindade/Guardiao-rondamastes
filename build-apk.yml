name: Gerar APK do Guardião Vigia

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar dependências
        run: npm install

      - name: Criar a pasta Android
        run: npx cap add android

      - name: Adicionar permissões de localização no Android
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's#<application#<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n\n    <application#' "$MANIFEST"
          echo "--- AndroidManifest.xml atualizado ---"
          cat "$MANIFEST"

      - name: Sincronizar arquivos do app
        run: npx cap sync android

      - name: Dar permissão ao gradlew
        run: chmod +x android/gradlew

      - name: Compilar o APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Publicar o APK
        uses: actions/upload-artifact@v4
        with:
          name: GuardiaoVigia-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
